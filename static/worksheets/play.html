<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TheCollapse - Play</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0e1117;
  --surface:      #161b27;
  --surface2:     #1c2233;
  --border:       #252d3d;
  --border-hover: #3a4560;
  --text:         #e8ecf3;
  --muted:        #8892a4;
  --accent:       #5b8fff;
}

body {
  min-height: 100vh;
  background-color: var(--bg);
  background-image: radial-gradient(circle, #1e2535 1.5px, transparent 1.5px);
  background-size: 28px 28px;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
}

nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(14,17,23,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(37,45,61,0.5);
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  letter-spacing: -0.3px;
}

.version-badge {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  background: none;
  border: none;
  cursor: pointer;
  transition: color .15s, background .15s;
  font-family: 'Inter', sans-serif;
}

.nav-btn:hover {
  color: var(--text);
  background: var(--surface);
}

main {
  margin-top: 56px;
  padding: 28px;
  flex: 1;
}

.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.game-meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.game-title {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.6px;
}

.game-subtitle {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 760px;
}

.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 2px;
}

.badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
}

.badge.accent {
  color: var(--text);
  border-color: rgba(91,143,255,.55);
  background: rgba(91,143,255,.12);
}

.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .15s;
  font-family: 'Inter', sans-serif;
}

.action-btn:hover {
  border-color: var(--border-hover);
  background: var(--surface2);
  transform: translateY(-1px);
}

.action-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.action-btn.primary:hover {
  opacity: .92;
}

.layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 18px;
  align-items: stretch;
}

.sidebar,
.game-panel {
  background: rgba(22,27,39,.88);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
}

.sidebar {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 560px;
}

.panel-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--muted);
  margin-bottom: 10px;
}

.info-block {
  padding: 14px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
}

.info-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(37,45,61,.65);
  font-size: 13px;
}

.info-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.info-label {
  color: var(--muted);
}

.info-value {
  color: var(--text);
  text-align: right;
  word-break: break-word;
}

.desc {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}

.game-panel {
  display: flex;
  flex-direction: column;
  min-height: 560px;
}

.frame-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(28,34,51,.45);
}

.frame-title {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.frame-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 18px rgba(91,143,255,.7);
  flex: 0 0 auto;
}

.frame-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.frame-url {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.iframe-wrap {
  position: relative;
  flex: 1;
  min-height: 500px;
  background: #0b0f16;
}

.game-frame {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #0b0f16;
}

.loading,
.error-state {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 24px;
}

.loading-box,
.error-box {
  max-width: 460px;
  background: rgba(22,27,39,.95);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 16px 40px rgba(0,0,0,.35);
}

.loading-box p,
.error-box p {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 10px;
}

.error-box h2 {
  font-size: 20px;
  margin-bottom: 6px;
}

.hidden {
  display: none !important;
}

.empty-embed {
  display: grid;
  place-items: center;
  height: 100%;
  padding: 32px;
  color: var(--muted);
  text-align: center;
}

.empty-embed a {
  color: var(--text);
  text-decoration: underline;
}

@media (max-width: 980px) {
  .layout {
    grid-template-columns: 1fr;
  }

  .sidebar {
    min-height: auto;
  }

  .game-panel {
    min-height: 70vh;
  }
}

@media (max-width: 720px) {
  nav {
    padding: 0 14px;
  }

  main {
    padding: 18px 14px 24px;
  }

  .game-title {
    font-size: 24px;
  }

  .actions {
    width: 100%;
  }

  .action-btn {
    flex: 1;
    justify-content: center;
  }

  .frame-header {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="../index.html" class="nav-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      TheCollapse
    </a>
    <span class="version-badge">v1.1</span>
  </div>
  <div class="nav-right">
    <a href="game.html" class="nav-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h18"/>
        <path d="M12 3v18"/>
      </svg>
      Games
    </a>
    <a href="../index.html" class="nav-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
  </div>
</nav>

<main>
  <div class="topbar">
    <div class="game-meta">
      <h1 class="game-title" id="game-title">Loading...</h1>
      <p class="game-subtitle" id="game-subtitle">ゲーム情報を読み込んでいます…</p>
      <div class="badges" id="badges"></div>
    </div>

    <div class="actions">
      <button class="action-btn" id="back-btn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        戻る
      </button>
      <button class="action-btn" id="fullscreen-btn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H3v5"/>
          <path d="M16 3h5v5"/>
          <path d="M21 16v5h-5"/>
          <path d="M3 16v5h5"/>
        </svg>
        全画面
      </button>
      <a class="action-btn primary" id="open-newtab-btn" href="#" target="_blank" rel="noopener noreferrer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3h7v7"/>
          <path d="M10 14 21 3"/>
          <path d="M21 14v7h-7"/>
          <path d="M3 10V3h7"/>
          <path d="M3 14v7h7"/>
        </svg>
        別タブで開く
      </a>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div>
        <div class="panel-title">Game Info</div>
        <div class="info-block" id="info-block">
          <div class="info-row">
            <div class="info-label">ID</div>
            <div class="info-value" id="game-id">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Category</div>
            <div class="info-value" id="game-category">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Source</div>
            <div class="info-value" id="game-source">-</div>
          </div>
        </div>
      </div>

      <div>
        <div class="panel-title">Description</div>
        <div class="desc" id="game-desc">-</div>
      </div>

      <div>
        <div class="panel-title">Tags</div>
        <div class="tags" id="game-tags"></div>
      </div>
    </aside>

    <section class="game-panel">
      <div class="frame-header">
        <div class="frame-title">
          <span class="frame-dot"></span>
          <div style="min-width:0">
            <div class="frame-name" id="frame-name">Game</div>
            <div class="frame-url" id="frame-url">Waiting for source…</div>
          </div>
        </div>
        <div class="frame-url" id="frame-hint">iframe / external URL 対応</div>
      </div>

      <div class="iframe-wrap" id="iframe-wrap">
        <div class="loading" id="loading">
          <div class="loading-box">
            <h2>Loading Game…</h2>
            <p>ゲーム情報を取得しています。<br>URL が見つかればここにゲーム画面を表示します。</p>
          </div>
        </div>

        <div class="error-state hidden" id="error-state">
          <div class="error-box">
            <h2>ゲームを表示できません</h2>
            <p id="error-text">game.json からこのゲームの URL を見つけられませんでした。</p>
          </div>
        </div>

        <iframe class="game-frame hidden" id="game-frame" title="Game Frame" allow="fullscreen; gamepad; autoplay"></iframe>
      </div>
    </section>
  </div>
</main>

<script>
const params = new URLSearchParams(location.search);
const gameId = params.get('id');

const els = {
  title: document.getElementById('game-title'),
  subtitle: document.getElementById('game-subtitle'),
  badges: document.getElementById('badges'),
  backBtn: document.getElementById('back-btn'),
  fsBtn: document.getElementById('fullscreen-btn'),
  openNewTab: document.getElementById('open-newtab-btn'),
  gameId: document.getElementById('game-id'),
  gameCategory: document.getElementById('game-category'),
  gameSource: document.getElementById('game-source'),
  gameDesc: document.getElementById('game-desc'),
  gameTags: document.getElementById('game-tags'),
  frameName: document.getElementById('frame-name'),
  frameUrl: document.getElementById('frame-url'),
  loading: document.getElementById('loading'),
  errorState: document.getElementById('error-state'),
  errorText: document.getElementById('error-text'),
  frame: document.getElementById('game-frame'),
  iframeWrap: document.getElementById('iframe-wrap')
};

els.backBtn.addEventListener('click', () => {
  history.length > 1 ? history.back() : (location.href = 'game.html');
});

els.fsBtn.addEventListener('click', async () => {
  const el = document.documentElement;
  try {
    if (!document.fullscreenElement) await el.requestFullscreen();
    else await document.exitFullscreen();
  } catch {}
});

function escapeText(v) {
  return String(v ?? '');
}

function renderBadges(game, categoryLabel) {
  const list = [];
  if (categoryLabel) list.push(`<span class="badge accent">${escapeText(categoryLabel)}</span>`);
  if (game.color) list.push(`<span class="badge">Color: ${escapeText(game.color)}</span>`);
  if (game.id) list.push(`<span class="badge">ID: ${escapeText(game.id)}</span>`);
  els.badges.innerHTML = list.join('');
}

function renderTags(tags) {
  const arr = Array.isArray(tags) ? tags : [];
  els.gameTags.innerHTML = arr.length
    ? arr.map(t => `<span class="tag">${escapeText(t)}</span>`).join('')
    : '<span class="tag">No tags</span>';
}

function showError(message) {
  els.loading.classList.add('hidden');
  els.errorState.classList.remove('hidden');
  els.errorText.textContent = message;
  els.frame.classList.add('hidden');
}

function showFrame(url) {
  els.loading.classList.add('hidden');
  els.errorState.classList.add('hidden');
  els.frame.classList.remove('hidden');
  els.frame.src = url;
}

async function loadGame() {
  if (!gameId) {
    els.title.textContent = 'No Game ID';
    els.subtitle.textContent = 'URL に id がありません。game.html から開いてください。';
    showError('id パラメータが見つかりません。');
    return;
  }

  try {
    const data = await fetch('game.json').then(r => r.json());
    const games = data.games || [];
    const categories = data.categories || [];
    const game = games.find(g => String(g.id) === String(gameId));

    if (!game) {
      els.title.textContent = 'Game Not Found';
      els.subtitle.textContent = `id="${gameId}" のゲームが見つかりませんでした。`;
      showError('このゲームは game.json 内に見つかりませんでした。');
      return;
    }

    const categoryLabel =
      (categories.find(c => c.id === game.category) || {}).label ||
      game.category ||
      'Game';

    const sourceUrl = game.url || game.src || game.link || game.path || '';
    const displaySource = sourceUrl || 'No URL';

    els.title.textContent = game.title || 'Untitled Game';
    els.subtitle.textContent = game.description || '';
    els.gameId.textContent = game.id || '-';
    els.gameCategory.textContent = categoryLabel;
    els.gameSource.textContent = displaySource;
    els.gameDesc.textContent = game.description || '説明がありません。';
    els.frameName.textContent = game.title || 'Game';
    els.frameUrl.textContent = displaySource;
    els.openNewTab.href = sourceUrl || '#';

    renderBadges(game, categoryLabel);
    renderTags(game.tags);

    if (!sourceUrl) {
      showError('game.json に url / src / link / path がありません。');
      return;
    }

    showFrame(sourceUrl);
  } catch (err) {
    els.title.textContent = 'Load Error';
    els.subtitle.textContent = 'game.json の読み込みに失敗しました。';
    showError('game.json を読み込めませんでした。ファイル名や配置を確認してください。');
  }
}

loadGame();
</script>
</body>
</html>
