<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0e1117;
  --surface:      #161b27;
  --surface2:     #1c2233;
  --border:       #252d3d;
  --border-hover: #3a4560;
  --text:         #e8ecf3;
  --muted:        #8892a4;
  --accent:       #5b8fff;
}

body {
  min-height: 100vh;
  background-color: var(--bg);
  background-image: radial-gradient(circle, #1e2535 1.5px, transparent 1.5px);
  background-size: 28px 28px;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  display: flex; flex-direction: column;
}

/* ─── Nav ─────────────────────────────────────── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 56px;
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(14,17,23,0.85); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(37,45,61,0.5);
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 17px; font-weight: 700; color: var(--text);
  text-decoration: none; letter-spacing: -0.3px;
}
.version-badge {
  font-size: 11px; font-weight: 500; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 2px 8px;
}
.nav-right { display: flex; align-items: center; gap: 4px; }
.nav-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 8px;
  font-size: 14px; font-weight: 500; color: var(--muted);
  text-decoration: none; background: none; border: none;
  cursor: pointer; transition: color .15s, background .15s;
  font-family: 'Inter', sans-serif;
}
.nav-btn:hover, .nav-btn.active { color: var(--text); background: var(--surface); }

/* ─── Main ─────────────────────────────────────── */
main { margin-top: 56px; padding: 44px 44px 80px; flex: 1; max-width: 920px; width: 100%; margin-left: auto; margin-right: auto; }

.page-header { margin-bottom: 36px; }
.page-title  { font-size: 30px; font-weight: 700; letter-spacing: -.6px; display: flex; align-items: center; gap: 12px; }
.page-subtitle { font-size: 14px; color: var(--muted); margin-top: 5px; }

/* ─── Timeline ───────────────────────────────────── */
.timeline { position: relative; padding-left: 28px; }
.timeline::before {
  content: ''; position: absolute; left: 6px; top: 8px; bottom: 8px;
  width: 2px; background: var(--border);
}

.release {
  position: relative; margin-bottom: 28px;
}
.release::before {
  content: ''; position: absolute; left: -27px; top: 22px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent); border: 3px solid var(--bg);
  box-shadow: 0 0 0 1px var(--accent);
}
.release.latest::before {
  background: #4ade80; box-shadow: 0 0 0 1px #4ade80, 0 0 10px rgba(74,222,128,.6);
}

.release-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 22px 24px;
  transition: border-color .2s, box-shadow .2s;
}
.release-card:hover { border-color: var(--border-hover); box-shadow: 0 8px 24px rgba(0,0,0,.3); }

.release-head {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.release-version {
  font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -.3px;
}
.release-latest-tag {
  font-size: 11px; font-weight: 600; color: #4ade80;
  background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.3);
  border-radius: 6px; padding: 2px 9px;
}

.release-body h4 {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin: 16px 0 8px;
}
.release-body h4:first-child { margin-top: 0; }
.release-body h5 {
  font-size: 13px; font-weight: 600; color: var(--muted);
  margin: 12px 0 6px; text-transform: none;
}
.release-body p {
  font-size: 13.5px; color: var(--muted); line-height: 1.7; margin: 6px 0;
}
.release-body ul { list-style: none; margin: 8px 0; padding: 0; }
.release-body li {
  font-size: 13.5px; color: var(--muted); line-height: 1.65;
  padding: 5px 0 5px 20px; position: relative;
}
.release-body li::before {
  content: ''; position: absolute; left: 4px; top: 13px;
  width: 5px; height: 5px; border-radius: 50%; background: var(--border-hover);
}
.release-body strong { color: var(--text); font-weight: 600; }
.release-body code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 1px 6px; color: #c9d4e8;
}

/* ─── States ─────────────────────────────────────── */
.state {
  text-align: center; padding: 70px 20px; color: var(--muted);
}
.state svg { margin-bottom: 16px; opacity: .35; }
.state p { font-size: 15px; }

.spinner {
  width: 30px; height: 30px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  margin: 0 auto 16px; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  main { padding: 32px 18px 70px; }
  .release-card { padding: 18px 18px; }
}
</style>

<main>
  <div class="page-header">
    <h1 class="page-title">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8z"/></svg>
      News &amp; Updates
    </h1>
    <p class="page-subtitle">TheCollapse の更新履歴・アップデート情報</p>
  </div>

  <div id="content">
    <div class="state" id="loading">
      <div class="spinner"></div>
      <p>更新履歴を読み込み中…</p>
    </div>
  </div>
</main>

<script>
/* ── Markdown の最小限のインライン整形 ──────────────────
   **太字** と `code` のみ対応。HTML はすべてエスケープしてから
   許可したパターンのみタグへ変換し、XSS を防止する。 */
function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function inlineMd(s) {
  let out = escapeHtml(s);
  // `code`
  out = out.replace(/`([^`]+)`/g, (m, p1) => `<code>${p1}</code>`);
  // **bold**
  out = out.replace(/\*\*([^*]+)\*\*/g, (m, p1) => `<strong>${p1}</strong>`);
  return out;
}

/* readme.md 全文から「## 更新履歴」セクションだけを抜き出し、
   ### v1.x ごとのリリースブロックに分割してパースする。 */
function parseChangelog(md) {
  const lines = md.split(/\r?\n/);

  // 「## 更新履歴」の開始位置を探す
  let start = -1;
  for (let i = 0; i < lines.length; i++) {
    if (/^##\s+更新履歴\s*$/.test(lines[i])) { start = i + 1; break; }
  }
  if (start === -1) return [];

  // 次の「## 」見出し（更新履歴の終わり）まで
  let end = lines.length;
  for (let i = start; i < lines.length; i++) {
    if (/^##\s+/.test(lines[i])) { end = i; break; }
  }

  const section = lines.slice(start, end);
  const releases = [];
  let current = null;

  for (const raw of section) {
    const line = raw.replace(/\s+$/,'');
    const verMatch = line.match(/^###\s+(.+)$/);
    if (verMatch) {
      current = { version: verMatch[1].trim(), blocks: [] };
      releases.push(current);
      continue;
    }
    if (!current) continue;
    current.blocks.push(line);
  }
  return releases;
}

/* リリースブロックの行配列を HTML へ変換 */
function renderReleaseBody(blocks) {
  let html = '';
  let inList = false;
  const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };

  for (const line of blocks) {
    if (/^---\s*$/.test(line)) { continue; }              // 区切り線は無視
    if (line.trim() === '') { continue; }                 // 空行

    let m;
    if ((m = line.match(/^####\s+(.+)$/))) {              // 小見出し
      closeList();
      html += `<h4>${inlineMd(m[1].trim())}</h4>`;
    } else if ((m = line.match(/^#####\s+(.+)$/))) {      // さらに小見出し
      closeList();
      html += `<h5>${inlineMd(m[1].trim())}</h5>`;
    } else if ((m = line.match(/^[-*]\s+(.+)$/))) {       // リスト項目
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inlineMd(m[1].trim())}</li>`;
    } else {                                              // 通常段落
      closeList();
      html += `<p>${inlineMd(line.trim())}</p>`;
    }
  }
  closeList();
  return html || '<p style="opacity:.6">（詳細なし）</p>';
}

function render(releases) {
  const content = document.getElementById('content');
  if (!releases.length) {
    content.innerHTML = `
      <div class="state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/></svg>
        <p>更新履歴が見つかりませんでした</p>
      </div>`;
    return;
  }

  // ナビのバージョンバッジを最新版に更新
  const latestVer = (releases[0].version.match(/v[\d.]+/) || [releases[0].version])[0];
  const navVer = document.getElementById('nav-version');
  if (navVer) navVer.textContent = latestVer;

  const html = releases.map((r, idx) => {
    const isLatest = idx === 0;
    return `
      <div class="release${isLatest ? ' latest' : ''}">
        <div class="release-card">
          <div class="release-head">
            <span class="release-version">${inlineMd(r.version)}</span>
            ${isLatest ? '<span class="release-latest-tag">最新</span>' : ''}
          </div>
          <div class="release-body">${renderReleaseBody(r.blocks)}</div>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `<div class="timeline">${html}</div>`;
}

async function loadNews() {
  const content = document.getElementById('content');
  try {
    const res = await fetch('/api/news', { cache: 'no-cache' });
    if (!res.ok) throw new Error('読み込みに失敗しました (' + res.status + ')');
    const md = await res.text();
    const releases = parseChangelog(md);
    render(releases);
  } catch (e) {
    content.innerHTML = `
      <div class="state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>${escapeHtml(e.message || 'エラーが発生しました')}</p>
      </div>`;
  }
}

loadNews();
</script>
</body>
