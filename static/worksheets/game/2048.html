<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0e1117; color:#e8ecf3; font-family:'Inter',sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; }
h1 { font-size:36px; font-weight:700; letter-spacing:-1px; }
.meta { display:flex; gap:16px; }
.score-box { background:#161b27; border:1px solid #252d3d; border-radius:8px; padding:8px 20px; text-align:center; }
.score-label { font-size:11px; color:#8892a4; text-transform:uppercase; letter-spacing:0.5px; }
.score-val { font-size:22px; font-weight:700; }
#board { display:grid; grid-template-columns:repeat(4,90px); grid-template-rows:repeat(4,90px); gap:8px; background:#161b27; border-radius:12px; padding:10px; border:1px solid #252d3d; }
.cell { border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; background:#1c2233; color:#e8ecf3; transition:background 0.1s; }
.cell[data-v="2"]    { background:#2a3550; }
.cell[data-v="4"]    { background:#2d3f60; }
.cell[data-v="8"]    { background:#5b8fff; color:#fff; }
.cell[data-v="16"]   { background:#a55bff; color:#fff; }
.cell[data-v="32"]   { background:#ff6b6b; color:#fff; }
.cell[data-v="64"]   { background:#ff4444; color:#fff; }
.cell[data-v="128"]  { background:#ffd166; color:#0e1117; font-size:18px; }
.cell[data-v="256"]  { background:#ffc107; color:#0e1117; font-size:18px; }
.cell[data-v="512"]  { background:#ff9800; color:#fff; font-size:16px; }
.cell[data-v="1024"] { background:#f44336; color:#fff; font-size:14px; }
.cell[data-v="2048"] { background:linear-gradient(135deg,#5b8fff,#a55bff); color:#fff; font-size:14px; }
.btn { background:#5b8fff; border:none; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
.btn:hover { opacity:0.85; }
#msg { font-size:18px; font-weight:600; color:#5b8fff; min-height:24px; }
</style>
</head>
<body>
<h1>2048</h1>
<div class="meta">
  <div class="score-box"><div class="score-label">SCORE</div><div class="score-val" id="score">0</div></div>
  <div class="score-box"><div class="score-label">BEST</div><div class="score-val" id="best">0</div></div>
</div>
<div id="board"></div>
<div id="msg"></div>
<button class="btn" onclick="init()">New Game</button>
<p style="font-size:12px;color:#8892a4;margin-top:-8px;">Arrow keys or WASD to move</p>
<script>
let grid, score=0, best=+localStorage.getItem('2048best')||0;
const boardEl=document.getElementById('board'), scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'), msgEl=document.getElementById('msg');
bestEl.textContent=best;
function init(){grid=Array.from({length:4},()=>Array(4).fill(0));score=0;scoreEl.textContent=0;msgEl.textContent='';add();add();render();}
function add(){let empty=[];for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);if(!empty.length)return;let[r,c]=empty[Math.floor(Math.random()*empty.length)];grid[r][c]=Math.random()<0.9?2:4;}
function render(){boardEl.innerHTML='';for(let r=0;r<4;r++)for(let c=0;c<4;c++){let d=document.createElement('div');d.className='cell';if(grid[r][c]){d.textContent=grid[r][c];d.dataset.v=grid[r][c];}boardEl.appendChild(d);}}
function slide(row){let f=row.filter(x=>x);let merged=[];for(let i=0;i<f.length;i++){if(f[i]===f[i+1]){merged.push(f[i]*2);score+=f[i]*2;i++;}else merged.push(f[i]);}while(merged.length<4)merged.push(0);return merged;}
function move(dir){let moved=false;let g=grid.map(r=>[...r]);if(dir==='left'||dir==='right'){for(let r=0;r<4;r++){let row=dir==='right'?[...grid[r]].reverse():grid[r];let s=slide(row);if(dir==='right')s.reverse();if(s.join()!==grid[r].join())moved=true;grid[r]=s;}}else{for(let c=0;c<4;c++){let col=grid.map(r=>r[c]);if(dir==='down')col.reverse();let s=slide(col);if(dir==='down')s.reverse();for(let r=0;r<4;r++)if(grid[r][c]!==s[r])moved=true;for(let r=0;r<4;r++)grid[r][c]=s[r];}}if(moved){if(score>best){best=score;localStorage.setItem('2048best',best);}scoreEl.textContent=score;bestEl.textContent=best;add();render();if(grid.flat().includes(2048))msgEl.textContent='🎉 2048 Reached!';else if(!canMove())msgEl.textContent='Game Over';}}
function canMove(){for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(!grid[r][c])return true;if(c<3&&grid[r][c]===grid[r][c+1])return true;if(r<3&&grid[r][c]===grid[r+1][c])return true;}return false;}
const MAP={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'left',d:'right',w:'up',s:'down'};
document.addEventListener('keydown',e=>{if(MAP[e.key]){e.preventDefault();move(MAP[e.key]);}});
init();
let startX=0, startY=0;

document.addEventListener("touchstart", e=>{
  const t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
});

document.addEventListener("touchend", e=>{
  const t = e.changedTouches[0];
  let dx = t.clientX - startX;
  let dy = t.clientY - startY;

  // スワイプ判定のしきい値
  if(Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

  if(Math.abs(dx) > Math.abs(dy)){
    // 横スワイプ
    if(dx > 0) move("right");
    else move("left");
  }else{
    // 縦スワイプ
    if(dy > 0) move("down");
    else move("up");
  }
});
</script>
</body>
</html>
